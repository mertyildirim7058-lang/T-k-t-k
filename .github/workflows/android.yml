name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Repoyu Klonla
      uses: actions/checkout@v4

    - name: JDK 17 Kurulumu
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Gradle'a Çalıştırma İzni Ver
      run: chmod +x gradlew

    - name: APK'yı Derle (Debug Modu)
      run: ./gradlew assembleDebug

    - name: Derlenen APK'yı İndirilebilir Yap (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: BackTap-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        
